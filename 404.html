<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS v1.0 — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .not-found-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; text-align:center; gap:24px; }
  .not-found-code { font-family:var(--display); font-size:96px; font-weight:900; color:var(--accent); opacity:.15; line-height:1; }
  .not-found-msg  { font-family:var(--display); font-size:20px; color:var(--text-bright); letter-spacing:3px; text-transform:uppercase; }
  .not-found-sub  { font-family:var(--mono); font-size:13px; color:var(--text-dim); }
  .not-found-btn  { font-family:var(--mono); font-size:12px; letter-spacing:2px; text-transform:uppercase; padding:12px 28px; border:1px solid var(--accent); color:var(--accent); text-decoration:none; border-radius:4px; transition:all .25s; }
  .not-found-btn:hover { background:rgba(0,212,255,.1); }
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">
      <div class="header-title">
        <a href="index.html" style="text-decoration:none;color:inherit;">NEXUS <span style="color:var(--accent2)">v1.0</span></a>
        <span class="sub">E-Crimes Hunting &amp; Disruption Guide</span>
      </div>
    </div>
  </div>
</header>
<div class="not-found-wrap">
  <div class="not-found-code">404</div>
  <div class="not-found-msg">Address Not Found</div>
  <div class="not-found-sub">// The wallet you're looking for doesn't exist on this chain</div>
  <a class="not-found-btn" href="index.html">← Return to Introduction</a>
</div>
<script src="assets/js/main.js"></script>
</body>
</html>
